<svg width="300" height="230" viewBox="90 90 320 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="violet-cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="violet-cyan-h" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="shield-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6c63ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield body -->
  <path d="M250 110 L322 140 L322 220 Q322 280 250 310 Q178 280 178 220 L178 140 Z"
    fill="url(#shield-fill)"
    stroke="url(#violet-cyan)"
    stroke-width="2.2"
    stroke-linejoin="round"/>

  <!-- Shield inner highlight -->
  <path d="M250 120 L314 146 L314 220 Q314 272 250 300 Q186 272 186 220 L186 146 Z"
    fill="none"
    stroke="url(#violet-cyan)"
    stroke-width="0.6"
    stroke-linejoin="round"
    opacity="0.3"/>

  <!-- Stream 1 (top dashed) -->
  <path d="M118 190 C152 180, 188 172, 250 210 C302 248, 338 240, 372 230"
    fill="none" stroke="url(#violet-cyan-h)" stroke-width="2" stroke-linecap="round" opacity="0.55"
    stroke-dasharray="5 4"/>

  <!-- Stream 2 (center main) -->
  <path d="M118 210 C156 202, 192 194, 250 210 C298 226, 334 218, 372 210"
    fill="none" stroke="url(#violet-cyan-h)" stroke-width="3.5" stroke-linecap="round" opacity="0.95"/>

  <!-- Stream 3 (bottom dashed) -->
  <path d="M118 230 C152 240, 190 248, 250 210 C300 172, 338 180, 372 190"
    fill="none" stroke="url(#violet-cyan-h)" stroke-width="2" stroke-linecap="round" opacity="0.55"
    stroke-dasharray="5 4"/>

  <!-- Arrow head -->
  <path d="M362 203 L375 210 L362 217" fill="none" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left node -->
  <g filter="url(#node-glow)">
    <circle cx="110" cy="210" r="14" fill="#6c63ff" opacity="0.25"/>
  </g>
  <circle cx="110" cy="210" r="9" fill="#6c63ff" stroke="#a09aff" stroke-width="1.5"/>
  <circle cx="110" cy="210" r="4" fill="white" opacity="0.9"/>

  <!-- Right node -->
  <g filter="url(#node-glow)">
    <circle cx="380" cy="210" r="14" fill="#00d4ff" opacity="0.2"/>
  </g>
  <circle cx="380" cy="210" r="9" fill="#00d4ff" stroke="#66e8ff" stroke-width="1.5"/>
  <circle cx="380" cy="210" r="4" fill="white" opacity="0.9"/>

  <!-- Lock body -->
  <rect x="237" y="214" width="26" height="20" rx="4" fill="url(#violet-cyan)" opacity="0.95"/>

  <!-- Lock shackle -->
  <path d="M242 214 L242 206 Q250 198 258 206 L258 214"
    fill="none" stroke="url(#violet-cyan-h)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Lock keyhole -->
  <circle cx="250" cy="222" r="3.5" fill="white" opacity="0.9"/>
  <rect x="248.5" y="223" width="3" height="5" rx="1" fill="white" opacity="0.9"/>

  <!-- Data particles -->
  <circle cx="168" cy="207" r="2" fill="#6c63ff" opacity="0.6"/>
  <circle cx="195" cy="203" r="1.5" fill="#8880ff" opacity="0.5"/>
  <circle cx="222" cy="206" r="1.5" fill="#00d4ff" opacity="0.5"/>
  <circle cx="280" cy="214" r="1.5" fill="#00d4ff" opacity="0.5"/>
  <circle cx="308" cy="213" r="1.5" fill="#33daff" opacity="0.5"/>
  <circle cx="334" cy="211" r="2" fill="#00d4ff" opacity="0.6"/>

  <!-- Top encryption dots -->
  <circle cx="244" cy="188" r="1.5" fill="#00d4ff" opacity="0.35"/>
  <circle cx="250" cy="184" r="1.5" fill="#6c63ff" opacity="0.35"/>
  <circle cx="256" cy="188" r="1.5" fill="#00d4ff" opacity="0.35"/>
</svg>